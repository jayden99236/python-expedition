<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
<title>Python Expedition — Learn Python by Playing</title>
<style>
  :root{
    --ink:#0c1a16;
    --panel:#12241e;
    --panel-2:#0f1f1a;
    --line:#1e3a30;
    --text:#eae4d2;
    --text-dim:#9fae9f;
    --gold:#f2b33d;
    --gold-dim:#b98a2e;
    --leaf:#4fbf8b;
    --ember:#e0645c;
    --mono:ui-monospace,"Cascadia Code","Source Code Pro",Menlo,Consolas,"Liberation Mono",monospace;
    --body:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:var(--body);
    font-size:16px;
    line-height:1.55;
    min-height:100vh;
  }
  ::selection{background:var(--gold);color:var(--ink)}

  /* ---------- header ---------- */
  header.top{
    display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap;
    padding:.9rem 1.4rem;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0e1e19,var(--ink));
    position:sticky;top:0;z-index:10;
  }
  .logo{
    font-family:var(--mono);
    font-size:1.02rem;font-weight:700;letter-spacing:.22em;
    color:var(--gold);white-space:nowrap;
  }
  .logo .snake{color:var(--leaf)}
  .hud{display:flex;align-items:center;gap:.9rem;margin-left:auto;flex-wrap:wrap}
  .rank{
    font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink);background:var(--gold);
    padding:.28rem .6rem;border-radius:2px;font-weight:700;white-space:nowrap;
  }
  .xpwrap{display:flex;align-items:center;gap:.55rem}
  .xpbar{width:150px;height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .xpbar>div{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0%;transition:width .5s ease}
  .xpnum{font-family:var(--mono);font-size:.78rem;color:var(--text-dim);font-variant-numeric:tabular-nums;white-space:nowrap}

  /* ---------- layout ---------- */
  .shell{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 58px)}
  @media (max-width:860px){.shell{grid-template-columns:1fr}}

  /* ---------- map rail ---------- */
  nav.map{
    border-right:1px solid var(--line);
    background:var(--panel-2);
    padding:1.2rem .9rem 2rem;
  }
  @media (max-width:860px){nav.map{border-right:none;border-bottom:1px solid var(--line)}}
  .map h2{
    font-family:var(--mono);font-size:.68rem;font-weight:600;
    letter-spacing:.24em;text-transform:uppercase;color:var(--text-dim);
    margin:1.3rem 0 .45rem .5rem;
  }
  .map h2:first-child{margin-top:0}
  .lvl{
    display:flex;align-items:center;gap:.6rem;width:100%;
    background:none;border:1px solid transparent;border-radius:4px;
    color:var(--text);font:inherit;font-size:.9rem;
    padding:.42rem .5rem;cursor:pointer;text-align:left;
  }
  .lvl:hover:not(:disabled){background:var(--panel);border-color:var(--line)}
  .lvl.active{background:var(--panel);border-color:var(--gold-dim)}
  .lvl:disabled{color:#5c6b5f;cursor:not-allowed}
  .lvl .node{
    font-family:var(--mono);font-size:.68rem;font-weight:700;
    width:1.7rem;height:1.7rem;flex:none;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--line);color:var(--text-dim);
    font-variant-numeric:tabular-nums;
  }
  .lvl.done .node{background:var(--leaf);border-color:var(--leaf);color:var(--ink)}
  .lvl.active .node{border-color:var(--gold);color:var(--gold)}
  .lvl:disabled .node{border-color:#2a3a31;color:#4a584d}
  .lvl .xpchip{margin-left:auto;font-family:var(--mono);font-size:.66rem;color:var(--gold-dim);font-variant-numeric:tabular-nums}
  .mapfoot{margin-top:2rem;padding:0 .5rem}
  .mapfoot button{
    background:none;border:none;color:#5c6b5f;font:inherit;font-size:.75rem;
    cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px;
  }
  .mapfoot button:hover{color:var(--ember)}

  /* ---------- main ---------- */
  main{padding:1.6rem 1.8rem 4rem;max-width:880px}
  @media (max-width:860px){main{padding:1.2rem 1rem 3rem}}
  .eyebrow{
    font-family:var(--mono);font-size:.7rem;letter-spacing:.24em;
    text-transform:uppercase;color:var(--gold);margin:0 0 .35rem;
  }
  h1.title{
    font-family:var(--mono);font-weight:700;
    font-size:clamp(1.5rem,3.4vw,2.1rem);
    letter-spacing:.02em;margin:0 0 1rem;text-wrap:balance;
  }
  .brief{max-width:62ch;color:var(--text)}
  .brief p{margin:.65rem 0}
  .brief code{
    font-family:var(--mono);font-size:.86em;
    background:var(--panel);border:1px solid var(--line);
    padding:.1em .35em;border-radius:3px;color:var(--gold);
  }
  .brief pre{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:.8rem 1rem;overflow-x:auto;margin:.8rem 0;
  }
  .brief pre code{background:none;border:none;padding:0;color:var(--text);font-size:.85rem;line-height:1.6}
  .goal{
    border-left:3px solid var(--gold);
    background:var(--panel);
    padding:.7rem 1rem;margin:1.1rem 0;
    border-radius:0 6px 6px 0;
    max-width:62ch;
  }
  .goal .goal-label{
    font-family:var(--mono);font-size:.66rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.25rem;
  }

  /* ---------- editor ---------- */
  .bench{margin-top:1.4rem}
  .bench-label{
    font-family:var(--mono);font-size:.66rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:.4rem;
    display:flex;align-items:center;gap:.6rem;
  }
  .bench-label .dotrow{display:inline-flex;gap:5px}
  .bench-label .dotrow i{width:8px;height:8px;border-radius:50%;background:var(--line);display:block}
  textarea.editor{
    width:100%;min-height:220px;resize:vertical;
    background:#0a1512;color:var(--text);
    font-family:var(--mono);font-size:.92rem;line-height:1.65;
    border:1px solid var(--line);border-radius:6px;
    padding:.9rem 1rem;
    tab-size:4;
  }
  textarea.editor:focus{outline:2px solid var(--gold-dim);outline-offset:1px;border-color:var(--gold-dim)}
  .btnrow{display:flex;gap:.6rem;margin-top:.7rem;flex-wrap:wrap;align-items:center}
  button.run{
    font-family:var(--mono);font-weight:700;font-size:.85rem;letter-spacing:.1em;
    background:var(--gold);color:var(--ink);
    border:none;border-radius:4px;padding:.6rem 1.4rem;cursor:pointer;
  }
  button.run:hover{background:#ffc75a}
  button.run:focus-visible,button.ghost:focus-visible,.lvl:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  button.ghost{
    font-family:var(--mono);font-size:.8rem;letter-spacing:.08em;
    background:none;color:var(--text-dim);
    border:1px solid var(--line);border-radius:4px;padding:.55rem 1rem;cursor:pointer;
  }
  button.ghost:hover{color:var(--text);border-color:var(--text-dim)}
  .kbd-hint{font-family:var(--mono);font-size:.7rem;color:#5c6b5f;margin-left:auto}

  /* ---------- console ---------- */
  .console{
    margin-top:1rem;background:#0a1512;
    border:1px solid var(--line);border-radius:6px;
    font-family:var(--mono);font-size:.88rem;line-height:1.6;
    padding:.8rem 1rem;min-height:3.2rem;white-space:pre-wrap;
    overflow-x:auto;
  }
  .console .muted{color:#5c6b5f}
  .console .err{color:var(--ember)}
  .console .exp{color:var(--text-dim)}
  .banner{
    margin-top:1rem;border-radius:6px;padding:.85rem 1.1rem;
    display:none;align-items:baseline;gap:.7rem;flex-wrap:wrap;
  }
  .banner.show{display:flex}
  .banner.win{background:rgba(79,191,139,.12);border:1px solid var(--leaf)}
  .banner.win .headline{color:var(--leaf);font-family:var(--mono);font-weight:700}
  .banner.lose{background:rgba(224,100,92,.09);border:1px solid rgba(224,100,92,.5)}
  .banner.lose .headline{color:var(--ember);font-family:var(--mono);font-weight:700}
  .banner .next{
    margin-left:auto;font-family:var(--mono);font-weight:700;font-size:.82rem;
    background:var(--leaf);color:var(--ink);border:none;border-radius:4px;
    padding:.45rem 1rem;cursor:pointer;
  }
  .banner .next:hover{filter:brightness(1.1)}
  @media (prefers-reduced-motion:no-preference){
    .banner.win.show{animation:rise .35s ease}
    @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  }
  .hintbox{
    margin-top:.9rem;border:1px dashed var(--line);border-radius:6px;
    padding:.7rem 1rem;color:var(--text-dim);max-width:62ch;display:none;
  }
  .hintbox.show{display:block}
  .hintbox b{color:var(--gold);font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600}
  .hintbox code{font-family:var(--mono);color:var(--gold);font-size:.85em}

  /* ---------- hero ---------- */
  .hero{max-width:640px;margin:3rem auto 0;text-align:left;padding:0 .5rem}
  .hero .eyebrow{margin-bottom:.6rem}
  .hero h1{
    font-family:var(--mono);font-weight:700;line-height:1.15;
    font-size:clamp(2rem,6vw,3.2rem);margin:0 0 1.1rem;letter-spacing:.01em;text-wrap:balance;
  }
  .hero h1 .cursor{display:inline-block;width:.55em;height:1em;background:var(--gold);vertical-align:-.12em;margin-left:.08em}
  @media (prefers-reduced-motion:no-preference){
    .hero h1 .cursor{animation:blink 1.1s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}
  }
  .hero p{color:var(--text-dim);max-width:52ch;font-size:1.05rem}
  .hero .creds{
    font-family:var(--mono);font-size:.78rem;color:var(--text-dim);
    border:1px solid var(--line);border-radius:6px;background:var(--panel);
    padding:.9rem 1.1rem;margin:1.5rem 0;line-height:2;
  }
  .hero .creds .g{color:var(--leaf)}
  .hero .creds .y{color:var(--gold)}
  .hero button.run{font-size:.95rem;padding:.75rem 1.8rem;margin-top:.4rem}

  .finish{max-width:60ch}
  .finish .bigrank{
    font-family:var(--mono);font-weight:700;font-size:clamp(1.6rem,4vw,2.4rem);
    color:var(--gold);margin:.6rem 0 1rem;
  }
</style>
</head>
<body>
<header class="top">
  <div class="logo"><span class="snake">&gt;&gt;&gt;</span> PYTHON EXPEDITION</div>
  <div class="hud">
    <span class="rank" id="rank">HATCHLING</span>
    <span class="xpwrap">
      <span class="xpbar"><div id="xpfill"></div></span>
      <span class="xpnum" id="xpnum">0 / 225 XP</span>
    </span>
  </div>
</header>

<div class="shell">
  <nav class="map" id="map" aria-label="Expedition map"></nav>
  <main id="main"></main>
</div>

<script>
'use strict';
/* =====================================================================
   PART 1 — A miniature Python interpreter (real lexer/parser/evaluator)
   Supports: print, variables, numbers (int/float), strings & f-strings,
   arithmetic (+ - * / // % **), comparisons, and/or/not, if/elif/else,
   while, for..in, range(), lists, .append()/.pop(), common str methods,
   def/return, break/continue/pass, len/str/int/float/abs/min/max/sum/round.
   ===================================================================== */

class PyError extends Error{
  constructor(kind,msg,line){super(msg);this.kind=kind;this.pyline=line;}
}
class PyNum{constructor(v,isFloat){this.v=v;this.isFloat=!!isFloat;}}
const PyNone = Symbol('None');
class BreakSig{} class ContinueSig{} class ReturnSig{constructor(v){this.v=v;}}

const KEYWORDS = new Set(['if','elif','else','while','for','in','def','return',
  'break','continue','pass','and','or','not','True','False','None']);
const TWO_OPS = ['**','//','==','!=','<=','>=','+=','-=','*=','/='];
const ONE_OPS = '+-*/%()[],:.<>=';

function decodeEscapes(s,line){
  let out='';
  for(let i=0;i<s.length;i++){
    if(s[i]==='\\'){
      const n=s[i+1];
      if(n==='n'){out+='\n';i++;}
      else if(n==='t'){out+='\t';i++;}
      else if(n==='\\'){out+='\\';i++;}
      else if(n==="'"){out+="'";i++;}
      else if(n==='"'){out+='"';i++;}
      else out+='\\';
    } else out+=s[i];
  }
  return out;
}

function lex(src){
  const lines = src.replace(/\r\n?/g,'\n').split('\n');
  const toks=[]; const indents=[0];
  for(let li=0; li<lines.length; li++){
    const raw = lines[li];
    const ln = li+1;
    const ws = raw.match(/^[ \t]*/)[0];
    const rest = raw.slice(ws.length);
    if(rest==='' || rest.startsWith('#')) continue;
    const indent = ws.replace(/\t/g,'    ').length;
    if(indent > indents[indents.length-1]){
      indents.push(indent); toks.push({t:'INDENT',line:ln});
    } else {
      while(indent < indents[indents.length-1]){ indents.pop(); toks.push({t:'DEDENT',line:ln}); }
      if(indent !== indents[indents.length-1])
        throw new PyError('IndentationError','unindent does not match any outer indentation level',ln);
    }
    let i=0;
    while(i<rest.length){
      const c=rest[i];
      if(c===' '||c==='\t'){i++;continue;}
      if(c==='#') break;
      // f-string
      if((c==='f'||c==='F') && (rest[i+1]==='"'||rest[i+1]==="'")){
        const q=rest[i+1]; let j=i+2; let body='';
        while(j<rest.length && rest[j]!==q){
          if(rest[j]==='\\'){body+=rest[j]+ (rest[j+1]||''); j+=2;}
          else {body+=rest[j]; j++;}
        }
        if(j>=rest.length) throw new PyError('SyntaxError','unterminated string literal',ln);
        toks.push({t:'FSTR',v:body,line:ln}); i=j+1; continue;
      }
      // string
      if(c==='"'||c==="'"){
        let j=i+1; let body='';
        while(j<rest.length && rest[j]!==c){
          if(rest[j]==='\\'){body+=rest[j]+(rest[j+1]||''); j+=2;}
          else {body+=rest[j]; j++;}
        }
        if(j>=rest.length) throw new PyError('SyntaxError','unterminated string literal',ln);
        toks.push({t:'STR',v:decodeEscapes(body,ln),line:ln}); i=j+1; continue;
      }
      // number
      if(/[0-9]/.test(c) || (c==='.' && /[0-9]/.test(rest[i+1]||''))){
        let j=i; let sawDot=false;
        while(j<rest.length && (/[0-9]/.test(rest[j]) || (rest[j]==='.' && !sawDot))){
          if(rest[j]==='.') sawDot=true; j++;
        }
        toks.push({t:'NUM',v:parseFloat(rest.slice(i,j)),f:sawDot,line:ln}); i=j; continue;
      }
      // name / keyword
      if(/[A-Za-z_]/.test(c)){
        let j=i; while(j<rest.length && /[A-Za-z0-9_]/.test(rest[j])) j++;
        const w=rest.slice(i,j);
        toks.push({t:KEYWORDS.has(w)?'KW':'NAME',v:w,line:ln}); i=j; continue;
      }
      const two=rest.slice(i,i+2);
      if(TWO_OPS.includes(two)){toks.push({t:'OP',v:two,line:ln}); i+=2; continue;}
      if(ONE_OPS.includes(c)){toks.push({t:'OP',v:c,line:ln}); i++; continue;}
      throw new PyError('SyntaxError',`invalid character '${c}'`,ln);
    }
    toks.push({t:'NEWLINE',line:ln});
  }
  while(indents.length>1){indents.pop();toks.push({t:'DEDENT',line:lines.length});}
  toks.push({t:'EOF',line:lines.length});
  return toks;
}

class Parser{
  constructor(toks){this.toks=toks;this.pos=0;}
  peek(){return this.toks[this.pos];}
  next(){return this.toks[this.pos++];}
  at(t,v){const k=this.peek();return k.t===t && (v===undefined || k.v===v);}
  eat(t,v){if(this.at(t,v))return this.next();return null;}
  expect(t,v,what){
    const k=this.peek();
    if(k.t===t && (v===undefined||k.v===v)) return this.next();
    throw new PyError('SyntaxError',`expected ${what||v||t}`,k.line);
  }
  parseProgram(){
    const body=[];
    while(!this.at('EOF')){
      if(this.eat('NEWLINE')) continue;
      body.push(this.parseStmt());
    }
    return {k:'block',body};
  }
  parseBlock(){
    // after ':' — either NEWLINE INDENT ... DEDENT, or one inline simple stmt
    if(this.eat('NEWLINE')){
      this.expect('INDENT',undefined,'an indented block');
      const body=[];
      while(!this.at('DEDENT') && !this.at('EOF')){
        if(this.eat('NEWLINE')) continue;
        body.push(this.parseStmt());
      }
      this.eat('DEDENT');
      return {k:'block',body};
    }
    const s=this.parseSimpleStmt();
    this.eat('NEWLINE');
    return {k:'block',body:[s]};
  }
  parseStmt(){
    const k=this.peek();
    if(k.t==='KW'){
      switch(k.v){
        case 'if': return this.parseIf();
        case 'while':{
          const line=this.next().line;
          const test=this.parseExpr();
          this.expect('OP',':');
          return {k:'while',test,body:this.parseBlock(),line};
        }
        case 'for':{
          const line=this.next().line;
          const name=this.expect('NAME',undefined,'a loop variable name').v;
          this.expect('KW','in');
          const iter=this.parseExpr();
          this.expect('OP',':');
          return {k:'for',name,iter,body:this.parseBlock(),line};
        }
        case 'def':{
          const line=this.next().line;
          const name=this.expect('NAME',undefined,'a function name').v;
          this.expect('OP','(');
          const params=[];
          if(!this.at('OP',')')){
            do{ params.push(this.expect('NAME',undefined,'a parameter name').v); }
            while(this.eat('OP',','));
          }
          this.expect('OP',')');
          this.expect('OP',':');
          return {k:'def',name,params,body:this.parseBlock(),line};
        }
      }
    }
    const s=this.parseSimpleStmt();
    this.eat('NEWLINE');
    return s;
  }
  parseIf(){
    const line=this.next().line; // 'if' or 'elif'
    const test=this.parseExpr();
    this.expect('OP',':');
    const body=this.parseBlock();
    let orelse=null;
    if(this.at('KW','elif')){ orelse={k:'block',body:[this.parseIf()]}; }
    else if(this.eat('KW','else')){ this.expect('OP',':'); orelse=this.parseBlock(); }
    return {k:'if',test,body,orelse,line};
  }
  parseSimpleStmt(){
    const k=this.peek();
    if(k.t==='KW'){
      if(k.v==='return'){ this.next();
        let val=null;
        if(!this.at('NEWLINE') && !this.at('EOF')) val=this.parseExpr();
        return {k:'return',val,line:k.line};
      }
      if(k.v==='break'){this.next();return {k:'break',line:k.line};}
      if(k.v==='continue'){this.next();return {k:'continue',line:k.line};}
      if(k.v==='pass'){this.next();return {k:'pass',line:k.line};}
    }
    const expr=this.parseExpr();
    const op=this.peek();
    if(op.t==='OP' && ['=','+=','-=','*=','/='].includes(op.v)){
      this.next();
      if(expr.k!=='name' && expr.k!=='index')
        throw new PyError('SyntaxError','cannot assign to this expression',op.line);
      const val=this.parseExpr();
      return {k:'assign',target:expr,op:op.v,val,line:op.line};
    }
    return {k:'exprstmt',expr,line:expr.line};
  }
  parseExpr(){return this.parseOr();}
  parseOr(){
    let l=this.parseAnd();
    while(this.at('KW','or')){const line=this.next().line;l={k:'or',l,r:this.parseAnd(),line};}
    return l;
  }
  parseAnd(){
    let l=this.parseNot();
    while(this.at('KW','and')){const line=this.next().line;l={k:'and',l,r:this.parseNot(),line};}
    return l;
  }
  parseNot(){
    if(this.at('KW','not')){const line=this.next().line;return {k:'not',e:this.parseNot(),line};}
    return this.parseCmp();
  }
  parseCmp(){
    let l=this.parseAdd();
    const k=this.peek();
    if(k.t==='OP' && ['==','!=','<','>','<=','>='].includes(k.v)){
      this.next();
      return {k:'cmp',op:k.v,l,r:this.parseAdd(),line:k.line};
    }
    if(k.t==='KW' && k.v==='in'){
      this.next();
      return {k:'in',l,r:this.parseAdd(),line:k.line};
    }
    return l;
  }
  parseAdd(){
    let l=this.parseMul();
    while(this.at('OP','+')||this.at('OP','-')){
      const o=this.next(); l={k:'bin',op:o.v,l,r:this.parseMul(),line:o.line};
    }
    return l;
  }
  parseMul(){
    let l=this.parseUnary();
    while(this.at('OP','*')||this.at('OP','/')||this.at('OP','//')||this.at('OP','%')){
      const o=this.next(); l={k:'bin',op:o.v,l,r:this.parseUnary(),line:o.line};
    }
    return l;
  }
  parseUnary(){
    if(this.at('OP','-')){const line=this.next().line;return {k:'neg',e:this.parseUnary(),line};}
    if(this.at('OP','+')){this.next();return this.parseUnary();}
    return this.parsePower();
  }
  parsePower(){
    const base=this.parsePostfix();
    if(this.at('OP','**')){
      const line=this.next().line;
      return {k:'bin',op:'**',l:base,r:this.parseUnary(),line};
    }
    return base;
  }
  parsePostfix(){
    let e=this.parseAtom();
    for(;;){
      if(this.at('OP','(')){
        const line=this.next().line;
        const args=[];
        if(!this.at('OP',')')){
          do{ args.push(this.parseExpr()); } while(this.eat('OP',','));
        }
        this.expect('OP',')');
        e={k:'call',fn:e,args,line};
      } else if(this.at('OP','[')){
        const line=this.next().line;
        const idx=this.parseExpr();
        this.expect('OP',']');
        e={k:'index',obj:e,idx,line};
      } else if(this.at('OP','.')){
        const line=this.next().line;
        const name=this.expect('NAME',undefined,'an attribute name').v;
        e={k:'attr',obj:e,name,line};
      } else break;
    }
    return e;
  }
  parseAtom(){
    const k=this.peek();
    if(k.t==='NUM'){this.next();return {k:'num',v:k.v,f:k.f,line:k.line};}
    if(k.t==='STR'){this.next();return {k:'str',v:k.v,line:k.line};}
    if(k.t==='FSTR'){this.next();return {k:'fstr',parts:parseFString(k.v,k.line),line:k.line};}
    if(k.t==='NAME'){this.next();return {k:'name',v:k.v,line:k.line};}
    if(k.t==='KW'){
      if(k.v==='True'){this.next();return {k:'bool',v:true,line:k.line};}
      if(k.v==='False'){this.next();return {k:'bool',v:false,line:k.line};}
      if(k.v==='None'){this.next();return {k:'none',line:k.line};}
    }
    if(this.eat('OP','(')){
      const e=this.parseExpr();
      this.expect('OP',')');
      return e;
    }
    if(this.eat('OP','[')){
      const items=[];
      if(!this.at('OP',']')){
        do{ if(this.at('OP',']'))break; items.push(this.parseExpr()); } while(this.eat('OP',','));
      }
      this.expect('OP',']');
      return {k:'list',items,line:k.line};
    }
    throw new PyError('SyntaxError',`unexpected ${k.t==='EOF'?'end of file':(k.t==='NEWLINE'?'end of line':`'${k.v}'`)}`,k.line);
  }
}

function parseExprSrc(src,line){
  const toks=lex(src);
  const p=new Parser(toks);
  // skip leading NEWLINE-less: lex of a one-liner yields tokens + NEWLINE + EOF
  const e=p.parseExpr();
  return e;
}
function parseFString(raw,line){
  const parts=[]; let lit='';
  for(let i=0;i<raw.length;i++){
    const c=raw[i];
    if(c==='{' && raw[i+1]==='{'){lit+='{';i++;continue;}
    if(c==='}' && raw[i+1]==='}'){lit+='}';i++;continue;}
    if(c==='{'){
      let depth=1;let j=i+1;let inner='';
      while(j<raw.length && depth>0){
        if(raw[j]==='{')depth++;
        if(raw[j]==='}'){depth--;if(depth===0)break;}
        inner+=raw[j];j++;
      }
      if(depth>0) throw new PyError('SyntaxError',"f-string: expected '}'",line);
      if(lit){parts.push({lit:decodeEscapes(lit,line)});lit='';}
      if(!inner.trim()) throw new PyError('SyntaxError','f-string: empty expression not allowed',line);
      parts.push({expr:parseExprSrc(inner,line)});
      i=j;continue;
    }
    if(c==='}') throw new PyError('SyntaxError',"f-string: single '}' is not allowed",line);
    lit+=c;
  }
  if(lit)parts.push({lit:decodeEscapes(lit,line)});
  return parts;
}

/* ---------- runtime ---------- */
function isNum(v){return v instanceof PyNum;}
function typeName(v){
  if(isNum(v))return v.isFloat?'float':'int';
  if(typeof v==='string')return 'str';
  if(typeof v==='boolean')return 'bool';
  if(Array.isArray(v))return 'list';
  if(v===PyNone)return 'NoneType';
  if(v&&v.pyfunc)return 'function';
  return 'object';
}
function truthy(v){
  if(v===PyNone)return false;
  if(typeof v==='boolean')return v;
  if(isNum(v))return v.v!==0;
  if(typeof v==='string')return v.length>0;
  if(Array.isArray(v))return v.length>0;
  return true;
}
function numToStr(n){
  if(n.isFloat && Number.isInteger(n.v)) return n.v.toFixed(1);
  return String(n.v);
}
function pyStr(v){
  if(typeof v==='string')return v;
  return pyRepr(v);
}
function pyRepr(v){
  if(isNum(v))return numToStr(v);
  if(typeof v==='string')return "'"+v.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"'";
  if(typeof v==='boolean')return v?'True':'False';
  if(v===PyNone)return 'None';
  if(Array.isArray(v))return '['+v.map(pyRepr).join(', ')+']';
  if(v&&v.pyfunc)return `<function ${v.name}>`;
  return String(v);
}
function pyEq(a,b){
  if(isNum(a)&&isNum(b))return a.v===b.v;
  if(typeof a==='boolean'&&isNum(b))return (a?1:0)===b.v;
  if(isNum(a)&&typeof b==='boolean')return a.v===(b?1:0);
  if(typeof a===typeof b && (typeof a==='string'||typeof a==='boolean'))return a===b;
  if(Array.isArray(a)&&Array.isArray(b)){
    if(a.length!==b.length)return false;
    return a.every((x,i)=>pyEq(x,b[i]));
  }
  if(a===PyNone||b===PyNone)return a===b;
  return a===b;
}
function toNum(v,line,ctx){
  if(isNum(v))return v;
  if(typeof v==='boolean')return new PyNum(v?1:0,false);
  throw new PyError('TypeError',`${ctx||'this operation'} needs a number, but got ${typeName(v)}`,line);
}

class Interp{
  constructor(){
    this.out=[]; this.curLine=''; this.steps=0;
  }
  emit(s){
    // handle newlines inside printed strings
    const parts=(this.curLine+s).split('\n');
    this.curLine=parts.pop();
    for(const p of parts)this.out.push(p);
  }
  endline(){this.out.push(this.curLine);this.curLine='';}
  tick(line){
    if(++this.steps>200000)
      throw new PyError('RuntimeError','your program ran for too long — check for an infinite loop',line);
  }
  run(src){
    const toks=lex(src);
    const prog=new Parser(toks).parseProgram();
    const env={vars:Object.create(null),parent:null};
    this.execBlock(prog,env);
    if(this.curLine!=='')this.endline();
  }
  execBlock(block,env){for(const s of block.body)this.execStmt(s,env);}
  execStmt(s,env){
    this.tick(s.line);
    switch(s.k){
      case 'exprstmt': this.evalExpr(s.expr,env); return;
      case 'assign':{
        let val=this.evalExpr(s.val,env);
        if(s.op!=='='){
          const cur=(s.target.k==='name')
            ? this.lookup(s.target.v,env,s.line)
            : this.evalExpr(s.target,env);
          val=this.binop(s.op[0],cur,val,s.line);
        }
        if(s.target.k==='name'){
          this.store(s.target.v,val,env);
        } else {
          const obj=this.evalExpr(s.target.obj,env);
          const idx=this.evalExpr(s.target.idx,env);
          if(!Array.isArray(obj))throw new PyError('TypeError',`'${typeName(obj)}' does not support item assignment`,s.line);
          const i=this.checkIndex(obj,idx,s.line);
          obj[i]=val;
        }
        return;
      }
      case 'if':
        if(truthy(this.evalExpr(s.test,env)))this.execBlock(s.body,env);
        else if(s.orelse)this.execBlock(s.orelse,env);
        return;
      case 'while':
        while(truthy(this.evalExpr(s.test,env))){
          this.tick(s.line);
          try{this.execBlock(s.body,env);}
          catch(e){
            if(e instanceof BreakSig)break;
            if(e instanceof ContinueSig)continue;
            throw e;
          }
        }
        return;
      case 'for':{
        const it=this.evalExpr(s.iter,env);
        let seq;
        if(Array.isArray(it))seq=it.slice();
        else if(typeof it==='string')seq=[...it];
        else if(it&&it.pyrange)seq=it.items;
        else throw new PyError('TypeError',`'${typeName(it)}' object is not iterable`,s.line);
        for(const item of seq){
          this.tick(s.line);
          this.store(s.name,item,env);
          try{this.execBlock(s.body,env);}
          catch(e){
            if(e instanceof BreakSig)break;
            if(e instanceof ContinueSig)continue;
            throw e;
          }
        }
        return;
      }
      case 'def':
        this.store(s.name,{pyfunc:true,name:s.name,params:s.params,body:s.body,defEnv:env},env);
        return;
      case 'return':
        throw new ReturnSig(s.val?this.evalExpr(s.val,env):PyNone);
      case 'break': throw new BreakSig();
      case 'continue': throw new ContinueSig();
      case 'pass': return;
    }
  }
  lookup(name,env,line){
    for(let e=env;e;e=e.parent)if(name in e.vars)return e.vars[name];
    if(name in BUILTIN_NAMES)return BUILTIN_NAMES[name];
    throw new PyError('NameError',`name '${name}' is not defined`,line);
  }
  store(name,val,env){env.vars[name]=val;}
  checkIndex(arr,idx,line){
    if(!isNum(idx)||idx.isFloat)throw new PyError('TypeError','list indices must be integers',line);
    let i=idx.v;
    if(i<0)i+=arr.length;
    if(i<0||i>=arr.length)throw new PyError('IndexError','list index out of range',line);
    return i;
  }
  binop(op,a,b,line){
    if(op==='+'){
      if(typeof a==='string'&&typeof b==='string')return a+b;
      if(typeof a==='string'||typeof b==='string')
        throw new PyError('TypeError',`can only join str with str — use str() or an f-string to mix in a ${typeName(typeof a==='string'?b:a)}`,line);
      if(Array.isArray(a)&&Array.isArray(b))return a.concat(b);
    }
    if(op==='*'){
      if(typeof a==='string'&&isNum(b)&&!b.isFloat)return a.repeat(Math.max(0,b.v));
      if(typeof b==='string'&&isNum(a)&&!a.isFloat)return b.repeat(Math.max(0,a.v));
    }
    const x=toNum(a,line,`'${op}'`),y=toNum(b,line,`'${op}'`);
    const f=x.isFloat||y.isFloat;
    switch(op){
      case '+':return new PyNum(x.v+y.v,f);
      case '-':return new PyNum(x.v-y.v,f);
      case '*':return new PyNum(x.v*y.v,f);
      case '/':
        if(y.v===0)throw new PyError('ZeroDivisionError','division by zero',line);
        return new PyNum(x.v/y.v,true);
      case '//':
        if(y.v===0)throw new PyError('ZeroDivisionError','integer division by zero',line);
        return new PyNum(Math.floor(x.v/y.v),f);
      case '%':
        if(y.v===0)throw new PyError('ZeroDivisionError','modulo by zero',line);
        return new PyNum(((x.v%y.v)+y.v)%y.v,f);
      case '**':{
        const r=Math.pow(x.v,y.v);
        return new PyNum(r,f||!Number.isInteger(r));
      }
    }
    throw new PyError('SyntaxError',`unsupported operator '${op}'`,line);
  }
  evalExpr(e,env){
    this.tick(e.line);
    switch(e.k){
      case 'num':return new PyNum(e.v,e.f);
      case 'str':return e.v;
      case 'bool':return e.v;
      case 'none':return PyNone;
      case 'name':return this.lookup(e.v,env,e.line);
      case 'list':return e.items.map(x=>this.evalExpr(x,env));
      case 'fstr':{
        let s='';
        for(const p of e.parts){
          if('lit' in p)s+=p.lit;
          else s+=pyStr(this.evalExpr(p.expr,env));
        }
        return s;
      }
      case 'neg':{
        const v=toNum(this.evalExpr(e.e,env),e.line,"unary '-'");
        return new PyNum(-v.v,v.isFloat);
      }
      case 'not':return !truthy(this.evalExpr(e.e,env));
      case 'and':{
        const l=this.evalExpr(e.l,env);
        return truthy(l)?this.evalExpr(e.r,env):l;
      }
      case 'or':{
        const l=this.evalExpr(e.l,env);
        return truthy(l)?l:this.evalExpr(e.r,env);
      }
      case 'cmp':{
        const a=this.evalExpr(e.l,env),b=this.evalExpr(e.r,env);
        if(e.op==='==')return pyEq(a,b);
        if(e.op==='!=')return !pyEq(a,b);
        let x,y;
        if(typeof a==='string'&&typeof b==='string'){x=a;y=b;}
        else {x=toNum(a,e.line,`'${e.op}'`).v;y=toNum(b,e.line,`'${e.op}'`).v;}
        switch(e.op){
          case '<':return x<y; case '>':return x>y;
          case '<=':return x<=y; case '>=':return x>=y;
        }
        break;
      }
      case 'in':{
        const item=this.evalExpr(e.l,env),cont=this.evalExpr(e.r,env);
        if(typeof cont==='string'){
          if(typeof item!=='string')throw new PyError('TypeError',`'in <string>' requires string on the left`,e.line);
          return cont.includes(item);
        }
        if(Array.isArray(cont))return cont.some(x=>pyEq(x,item));
        if(cont&&cont.pyrange)return cont.items.some(x=>pyEq(x,item));
        throw new PyError('TypeError',`argument of type '${typeName(cont)}' is not iterable`,e.line);
      }
      case 'bin':return this.binop(e.op,this.evalExpr(e.l,env),this.evalExpr(e.r,env),e.line);
      case 'index':{
        const obj=this.evalExpr(e.obj,env);
        const idx=this.evalExpr(e.idx,env);
        if(typeof obj==='string'){
          if(!isNum(idx)||idx.isFloat)throw new PyError('TypeError','string indices must be integers',e.line);
          let i=idx.v; if(i<0)i+=obj.length;
          if(i<0||i>=obj.length)throw new PyError('IndexError','string index out of range',e.line);
          return obj[i];
        }
        if(Array.isArray(obj))return obj[this.checkIndex(obj,idx,e.line)];
        throw new PyError('TypeError',`'${typeName(obj)}' object is not subscriptable`,e.line);
      }
      case 'attr':{
        const obj=this.evalExpr(e.obj,env);
        return this.getMethod(obj,e.name,e.line);
      }
      case 'call':{
        const fn=this.evalExpr(e.fn,env);
        const args=e.args.map(a=>this.evalExpr(a,env));
        return this.callFn(fn,args,e.line);
      }
    }
    throw new PyError('RuntimeError','unsupported expression',e.line);
  }
  getMethod(obj,name,line){
    const self=this;
    if(Array.isArray(obj)){
      const m={
        append:(a)=>{if(a.length!==1)throw new PyError('TypeError','append() takes exactly one argument',line);obj.push(a[0]);return PyNone;},
        pop:(a)=>{
          if(obj.length===0)throw new PyError('IndexError','pop from empty list',line);
          if(a.length===0)return obj.pop();
          const i=self.checkIndex(obj,a[0],line);
          return obj.splice(i,1)[0];
        },
        remove:(a)=>{
          const i=obj.findIndex(x=>pyEq(x,a[0]));
          if(i<0)throw new PyError('ValueError','list.remove(x): x not in list',line);
          obj.splice(i,1);return PyNone;
        },
      }[name];
      if(m)return {pynative:true,name,call:m};
    }
    if(typeof obj==='string'){
      const m={
        upper:()=>obj.toUpperCase(),
        lower:()=>obj.toLowerCase(),
        title:()=>obj.replace(/\b\w/g,c=>c.toUpperCase()),
        strip:()=>obj.trim(),
        replace:(a)=>{
          if(a.length!==2||typeof a[0]!=='string'||typeof a[1]!=='string')
            throw new PyError('TypeError','replace() takes two string arguments',line);
          return obj.split(a[0]).join(a[1]);
        },
        count:(a)=>{
          if(a.length!==1||typeof a[0]!=='string')throw new PyError('TypeError','count() takes one string argument',line);
          if(a[0]==='')return new PyNum(obj.length+1,false);
          return new PyNum(obj.split(a[0]).length-1,false);
        },
        split:(a)=>{
          if(a.length===0)return obj.trim().split(/\s+/).filter(s=>s!=='');
          return obj.split(a[0]);
        },
      }[name];
      if(m)return {pynative:true,name,call:(args)=>{
        if(['upper','lower','title','strip'].includes(name)&&args.length)
          throw new PyError('TypeError',`${name}() takes no arguments`,line);
        return m(args);
      }};
      // allow zero-arg forms called immediately
    }
    throw new PyError('AttributeError',`'${typeName(obj)}' object has no attribute '${name}'`,line);
  }
  callFn(fn,args,line){
    if(fn&&fn.pynative)return fn.call(args);
    if(fn&&fn.pybuiltin)return fn.call(this,args,line);
    if(fn&&fn.pyfunc){
      if(args.length!==fn.params.length)
        throw new PyError('TypeError',`${fn.name}() takes ${fn.params.length} argument${fn.params.length===1?'':'s'} but ${args.length} ${args.length===1?'was':'were'} given`,line);
      const local={vars:Object.create(null),parent:fn.defEnv};
      fn.params.forEach((p,i)=>local.vars[p]=args[i]);
      try{this.execBlock(fn.body,local);}
      catch(e){
        if(e instanceof ReturnSig)return e.v;
        throw e;
      }
      return PyNone;
    }
    throw new PyError('TypeError',`'${typeName(fn)}' object is not callable`,line);
  }
}

const BUILTIN_NAMES={
  print:{pybuiltin:true,call(interp,args){
    interp.emit(args.map(pyStr).join(' '));
    interp.endline();
    return PyNone;
  }},
  range:{pybuiltin:true,call(interp,args,line){
    let start=0,stop,step=1;
    const iv=(a,what)=>{
      const n=toNum(a,line,'range()');
      if(n.isFloat)throw new PyError('TypeError',`'float' object cannot be interpreted as an integer — range() needs whole numbers`,line);
      return n.v;
    };
    if(args.length===1)stop=iv(args[0]);
    else if(args.length===2){start=iv(args[0]);stop=iv(args[1]);}
    else if(args.length===3){start=iv(args[0]);stop=iv(args[1]);step=iv(args[2]);}
    else throw new PyError('TypeError','range() takes 1 to 3 arguments',line);
    if(step===0)throw new PyError('ValueError','range() step argument must not be zero',line);
    const items=[];
    if(step>0)for(let i=start;i<stop;i+=step){items.push(new PyNum(i,false));if(items.length>100000)throw new PyError('RuntimeError','range too large',line);}
    else for(let i=start;i>stop;i+=step){items.push(new PyNum(i,false));if(items.length>100000)throw new PyError('RuntimeError','range too large',line);}
    return {pyrange:true,items};
  }},
  len:{pybuiltin:true,call(interp,args,line){
    const v=args[0];
    if(typeof v==='string')return new PyNum(v.length,false);
    if(Array.isArray(v))return new PyNum(v.length,false);
    if(v&&v.pyrange)return new PyNum(v.items.length,false);
    throw new PyError('TypeError',`object of type '${typeName(v)}' has no len()`,line);
  }},
  str:{pybuiltin:true,call(interp,args){return args.length?pyStr(args[0]):'';}},
  int:{pybuiltin:true,call(interp,args,line){
    const v=args[0];
    if(isNum(v))return new PyNum(Math.trunc(v.v),false);
    if(typeof v==='boolean')return new PyNum(v?1:0,false);
    if(typeof v==='string'){
      const t=v.trim();
      if(!/^[+-]?\d+$/.test(t))throw new PyError('ValueError',`invalid literal for int(): '${v}'`,line);
      return new PyNum(parseInt(t,10),false);
    }
    throw new PyError('TypeError',`int() can't convert ${typeName(v)}`,line);
  }},
  float:{pybuiltin:true,call(interp,args,line){
    const v=args[0];
    if(isNum(v))return new PyNum(v.v,true);
    if(typeof v==='string'){
      const n=parseFloat(v.trim());
      if(isNaN(n))throw new PyError('ValueError',`could not convert string to float: '${v}'`,line);
      return new PyNum(n,true);
    }
    throw new PyError('TypeError',`float() can't convert ${typeName(v)}`,line);
  }},
  abs:{pybuiltin:true,call(interp,args,line){
    const n=toNum(args[0],line,'abs()');
    return new PyNum(Math.abs(n.v),n.isFloat);
  }},
  round:{pybuiltin:true,call(interp,args,line){
    const n=toNum(args[0],line,'round()');
    if(args.length>1){
      const d=toNum(args[1],line,'round()').v;
      const f=Math.pow(10,d);
      return new PyNum(Math.round(n.v*f)/f,true);
    }
    return new PyNum(Math.round(n.v),false);
  }},
  min:{pybuiltin:true,call(interp,args,line){
    const vals=(args.length===1&&Array.isArray(args[0]))?args[0]:args;
    if(!vals.length)throw new PyError('ValueError','min() arg is an empty sequence',line);
    return vals.reduce((a,b)=>toNum(b,line,'min()').v<toNum(a,line,'min()').v?b:a);
  }},
  max:{pybuiltin:true,call(interp,args,line){
    const vals=(args.length===1&&Array.isArray(args[0]))?args[0]:args;
    if(!vals.length)throw new PyError('ValueError','max() arg is an empty sequence',line);
    return vals.reduce((a,b)=>toNum(b,line,'max()').v>toNum(a,line,'max()').v?b:a);
  }},
  sum:{pybuiltin:true,call(interp,args,line){
    const v=args[0];
    const items=Array.isArray(v)?v:(v&&v.pyrange?v.items:null);
    if(!items)throw new PyError('TypeError',`sum() needs a list or range, got ${typeName(v)}`,line);
    let total=new PyNum(0,false);
    for(const x of items){
      const n=toNum(x,line,'sum()');
      total=new PyNum(total.v+n.v,total.isFloat||n.isFloat);
    }
    return total;
  }},
  input:{pybuiltin:true,call(interp,args,line){
    throw new PyError('RuntimeError',"input() isn't available on the island — assign a value to a variable instead",line);
  }},
  type:{pybuiltin:true,call(interp,args){
    return `<class '${typeName(args[0])}'>`;
  }},
};

function runPython(src){
  const interp=new Interp();
  try{
    interp.run(src);
    return {out:interp.out,error:null};
  }catch(e){
    if(e instanceof PyError)
      return {out:interp.out,error:`${e.kind}: ${e.message}`+(e.pyline?` (line ${e.pyline})`:'')};
    return {out:interp.out,error:'InternalError: '+e.message};
  }
}

function editorSetup(ta){
  ta.addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const s=ta.selectionStart,epos=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+'    '+ta.value.slice(epos);
      ta.selectionStart=ta.selectionEnd=s+4;
    }
    if(e.key==='Enter'){
      const s=ta.selectionStart;
      const before=ta.value.slice(0,s);
      const lineStart=before.lastIndexOf('\n')+1;
      const line=before.slice(lineStart);
      let indent=line.match(/^ */)[0];
      if(line.trimEnd().endsWith(':'))indent+='    ';
      if(indent){
        e.preventDefault();
        ta.value=before+'\n'+indent+ta.value.slice(ta.selectionEnd);
        ta.selectionStart=ta.selectionEnd=s+1+indent.length;
      }
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
      e.preventDefault();
      const btn=document.querySelector('button.run[data-runs]');
      if(btn)btn.click();
    }
  });
}

  if(!html)html='<span class="muted"># (no output — did you forget print()?)</span>';

function normalize(s){

    hintbox.classList.add('show');
    hintIdx[lv.id]=i+1;
    if(i+1>=lv.hints.length)hintbtn.textContent='HINTS SHOWN';
  });
  solbtn.addEventListener('click',()=>{
    hintbox.innerHTML=`<b>Solution</b><br><pre style="margin:.5rem 0 0"><code>${escHtml(lv.solution)}</code></pre>`;
    hintbox.classList.add('show');
  });
  $('#runbtn').addEventListener('click',()=>runLevel(lv,ta));
}

function runLevel(lv,ta){
  const code=ta.value;
  const res=runPython(code);
  showConsole(res);
  const banner=$('#banner');
  banner.className='banner';
  // requirement checks first (with code that at least ran)
  if(!res.error){
    for(const r of lv.require){
      if(!r.re.test(code)){
        banner.className='banner lose show';
        banner.innerHTML=`<span class="headline">NOT QUITE —</span><span>${escHtml(r.msg)}</span>`;
        bumpAttempts(lv);
        return;
      }
    }
  }
  const got=normalize(res.out.join('\n'));
  const want=normalize(lv.expected);
  if(!res.error && got===want){
    const first=!isSolved(lv.id);
    if(first){
      state.solved.push(lv.id);
      state.xp+=lv.xp;
      save();renderHUD();renderMap();
    }
    const idx=LEVELS.indexOf(lv);
    const next=LEVELS[idx+1];
    banner.className='banner win show';
    banner.innerHTML=`<span class="headline">✓ OUTPUT MATCHES${first?` — +${lv.xp} XP`:''}</span>
      <span>${first&&rankJustChanged()?`New rank: <b style="color:var(--gold)">${rankFor(state.xp)}</b>`:''}</span>
      ${next?`<button class="next" id="nextbtn">NEXT: ${escHtml(next.title.toUpperCase())} ▸</button>`
            :`<button class="next" id="nextbtn">FINISH EXPEDITION ▸</button>`}`;
    $('#nextbtn').addEventListener('click',()=>{
      state.current=next?next.id:'finish';save();render();
      window.scrollTo({top:0});
    });
  } else if(!res.error){
    banner.className='banner lose show';
    banner.innerHTML=`<span class="headline">CLOSE —</span><span>the code ran, but the output doesn't match yet.</span>
      <span style="flex-basis:100%;font-family:var(--mono);font-size:.8rem" class="exp">expected:\n${escHtml(want)}\n\ngot:\n${escHtml(got)||'(nothing)'}</span>`;
    bumpAttempts(lv);
  } else {
    bumpAttempts(lv);
  }
}
let prevRank=null;
function rankJustChanged(){
  const r=rankFor(state.xp);
  const changed=prevRank!==null&&r!==prevRank;
  prevRank=r;
  return changed;
}
function bumpAttempts(lv){
  attempts[lv.id]=(attempts[lv.id]||0)+1;
  if(attempts[lv.id]>=3)$('#solbtn').style.display='';
}

function renderPlayground(){
  const draft=state.drafts['playground'];
  mainEl.innerHTML=`
    <p class="eyebrow">Free Roam</p>
    <h1 class="title">The Playground</h1>
    <div class="brief"><p>No objective, no checker — just you and the interpreter. Everything from
    the expedition works here: variables, f-strings, <code>if</code>/<code>elif</code>/<code>else</code>,
    loops, lists, and functions.</p></div>
    ${benchHTML(draft!==undefined?draft:'# The island is yours.\nfor i in range(3):\n    print(f"echo {i}")\n')}`;
  const ta=$('#code');editorSetup(ta);
  ta.addEventListener('input',()=>{state.drafts['playground']=ta.value;save();});
  $('#resetbtn').addEventListener('click',()=>{
    ta.value='';delete state.drafts['playground'];save();
    $('#console').innerHTML='<span class="muted"># output appears here — press RUN</span>';
  });
  $('#runbtn').addEventListener('click',()=>{
    showConsole(runPython(ta.value));
  });
}

function render(){
  renderHUD();renderMap();
  prevRank=rankFor(state.xp);
  if(state.current==='playground')return renderPlayground();
  if(state.current==='finish'||(state.solved.length===LEVELS.length&&state.current===null))return renderFinish();
  const lv=LEVELS.find(l=>l.id===state.current);
  if(lv&&isUnlocked(LEVELS.indexOf(lv)))return renderLevel(lv);
  renderHero();
}
render();
</script>
